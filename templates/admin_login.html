<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="PUBG Turnuvasy Admin Panel">
    <meta name="robots" content="noindex, nofollow">
    <title>Admin - PUBG Turnuvasy</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-animation">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>
    <div class="container main-content">
        <div class="admin-login-box">
            <div class="admin-icon" aria-hidden="true">🔐</div>
            <h1>Admin Panel</h1>
            <form id="admin-login-form" novalidate>
                <div class="form-group">
                    <label for="sifre">Parol</label>
                    <input type="password" id="sifre" 
                           placeholder="Paroly giriziň" 
                           required 
                           autocomplete="current-password"
                           minlength="6">
                </div>
                <button type="submit" class="btn-submit" id="login-btn">
                    <span class="btn-text">GIR</span>
                </button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('admin-login-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const sifre = document.getElementById('sifre').value;
            if (sifre.length < 6) {
                alert('Parol 6 harpdan uly bolmaly!');
                return;
            }

            const btn = document.getElementById('login-btn');
            const btnText = btn.querySelector('.btn-text');
            btnText.textContent = '⏳ GIRILÝAR...';
            btn.disabled = true;

            try {
                const response = await fetch('/api/admin-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sifre: sifre })
                });

                if (!response.ok) {
                    if (response.status === 429) {
                        alert('Gaty köp synanyşyk! 1 minut garaşyp gaýtadan synanyşyň.');
                    } else {
                        throw new Error('Server ýalňyşlygy: ' + response.status);
                    }
                    btnText.textContent = 'GIR';
                    btn.disabled = false;
                    return;
                }

                const result = await response.json();

                if (result.success) {
                    window.location.href = '/admin/panel';
                } else {
                    alert(result.message || 'Parol nädogry!');
                    btnText.textContent = 'GIR';
                    btn.disabled = false;
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Ýalňyşlyk ýüze çykdy: ' + error.message);
                btnText.textContent = 'GIR';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
